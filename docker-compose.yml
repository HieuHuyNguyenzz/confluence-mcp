version: "3.8"

services:
  confluence-mcp:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CONFLUENCE_URL=${CONFLUENCE_URL}
      - CONFLUENCE_USERNAME=${CONFLUENCE_USERNAME}
      - CONFLUENCE_API_TOKEN=${CONFLUENCE_API_TOKEN}
      - CONFLUENCE_VERIFY_SSL=${CONFLUENCE_VERIFY_SSL:-true}
    restart: unless-stopped
